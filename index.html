<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto Final JavaScript</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/buscaminas.css">
    <link rel="stylesheet" href="css/sudoku.css">
    <link rel="stylesheet" href="css/catgallery.css">
    <link rel="stylesheet" href="css/rickmorty.css">
</head>

<body>

  <header>
    <h1>Proyecto Final JavaScript</h1>
    <nav id="menu">
      <button data-target="buscaminas">Buscaminas</button>
      <button data-target="sudoku">Sudoku Solver</button>
      <button data-target="catgallery">CatGallery</button>
      <button data-target="rickmorty">Rick & Morty Explorer</button>
    </nav>
  </header>

  <main>

    <!-- Buscaminas -->
    <section id="buscaminas" class="app-section hidden">
    <h2>Buscaminas</h2>

    <div id="buscaminas-controls">
        <label>
        Tamaño:
        <select id="bm-size">
            <option value="8">8 x 8</option>
            <option value="12">12 x 12</option>
            <option value="16">16 x 16</option>
        </select>
        </label>

        <label>
        Minas:
        <input type="number" id="bm-mines" min="1" value="10">
        </label>

        <button id="bm-start">Iniciar</button>

        <span id="bm-timer">Tiempo: 0s</span>
        <span id="bm-mines-left">Minas: 0</span>
    </div>

    <div id="buscaminas-board"></div>

    <div id="buscaminas-message"></div>
    </section>

    <!-- Sudoku -->
    <section id="sudoku" class="app-section hidden">
        <h2>Sudoku Solver</h2>

        <div id="sudoku-controls">
            <button id="sdk-solve">Resolver</button>
            <button id="sdk-clear">Limpiar</button>
        </div>

        <div id="sudoku-board"></div>

        <div id="sudoku-message"></div>
    </section>

    <!-- CatGallery -->
    <section id="catgallery" class="app-section hidden">
      <h2>CatGallery</h2>

      <div id="cat-controls">
        <label>
          Categoría:
          <select id="cat-category">
            <option value="">Todas</option>
            <option value="1">Hats</option>
            <option value="2">Space</option>
            <option value="3">Funny</option>
            <option value="4">Sunglasses</option>
            <option value="5">Boxes</option>
          </select>
        </label>

        <button id="cat-load">Cargar nuevos gatos</button>
        <button id="cat-more">Cargar más gatos</button>
      </div>

      <div id="cat-grid"></div>

      <div id="cat-message"></div>

      <div id="cat-modal" class="cat-modal hidden">
        <div class="cat-modal-content">
          <span id="cat-modal-close" class="cat-modal-close">&times;</span>
          <img id="cat-modal-img" src="" alt="Gato grande">
        </div>
      </div>

    </section>

    <!-- Rick & Morty -->
    <section id="rickmorty" class="app-section hidden">
      <h2>Rick & Morty Explorer</h2>

      <div id="rm-controls">
        <input type="text" id="rm-search" placeholder="Buscar personaje...">
        <button id="rm-search-btn">Buscar</button>

        <div id="rm-pagination">
          <button id="rm-prev">Anterior</button>
          <span id="rm-page">Página 1</span>
          <button id="rm-next">Siguiente</button>
        </div>
      </div>

      <div id="rm-grid"></div>

      <div id="rm-message"></div>

      <div id="rm-modal" class="rm-modal hidden">
        <div class="rm-modal-content">
          <span id="rm-modal-close" class="rm-modal-close">&times;</span>
          <img id="rm-modal-img" src="" alt="Personaje">
          <div id="rm-modal-info"></div>
        </div>
      </div>
    </section>

  </main>

  <footer>
    <p>Proyecto realizado por Alejandro Sánchez Cuétara — <a href="https://github.com/ASCiiLex" target="_blank">GitHub</a></p>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>

  <!-- Scripts de cada mini‑app -->
  <script src="js/buscaminas.js"></script>
  <script src="js/sudoku.js"></script>
  <script src="js/catgallery.js"></script>
  <script src="js/rickmorty.js"></script>

</body>
</html>
